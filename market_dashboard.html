<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>전국데이터지수 대시보드 - 공실뉴스</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --brand-blue: #0A2540;
            --brand-light: #F6F9FC;
            --brand-accent: #00D4FF;
            --up-color: #d32f2f;
            --down-color: #1976d2;
            --text-main: #333;
            --text-muted: #666;
            --border-light: #eaeaea;
        }
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { margin: 0; background-color: var(--brand-light); color: var(--text-main); line-height: 1.6; }
        
        .topbar { background: #fff; padding: 15px 30px; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;}
        .topbar .logo { font-size: 24px; font-weight: 800; color: var(--brand-blue); text-decoration: none; display: flex; align-items: center; gap: 10px;}
        .topbar .logo i { color: var(--brand-accent); }
        .back-btn { padding: 8px 16px; background: var(--brand-blue); color: #fff; text-decoration: none; border-radius: 4px; font-size: 14px; font-weight: 600; transition: 0.2s;}
        .back-btn:hover { background: #000; }

        .dashboard-container { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }
        .dashboard-header h1 { font-size: 32px; font-weight: 800; margin: 0; color: #111; }
        .dashboard-header p { margin: 5px 0 0; color: var(--text-muted); font-size: 16px; }
        .last-update { font-size: 14px; color: #888; background: #fff; padding: 6px 12px; border-radius: 20px; border: 1px solid #ddd; }

        /* Summary Cards */
        .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05); }
        .card-icon { width: 44px; height: 44px; border-radius: 50%; background: var(--brand-light); display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 15px; color: var(--brand-blue); }
        .card-title { font-size: 15px; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; }
        .card-value { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin: 0; display: flex; align-items: center; gap: 10px;}
        .card-change { font-size: 14px; font-weight: 600; padding: 4px 8px; border-radius: 4px; display: inline-flex; align-items: center; gap: 4px;}
        .change-up { color: var(--up-color); background: rgba(211,47,47,0.1); }
        .change-down { color: var(--down-color); background: rgba(25,118,210,0.1); }

        /* Charts Section */
        .charts-section { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; margin-bottom: 40px; }
        .chart-box { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .chart-title { font-size: 20px; font-weight: 700; margin: 0; }
        .chart-filters select { padding: 8px 12px; border-radius: 6px; border: 1px solid #ddd; font-size: 14px; background: #fff; outline:none; }
        .canvas-container { position: relative; height: 350px; width: 100%; }

        /* Data Table Section */
        .table-section { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .table-title { font-size: 20px; font-weight: 700; margin: 0 0 20px 0; display: flex; align-items: center; gap: 10px;}
        .data-table { width: 100%; border-collapse: collapse; text-align: left; }
        .data-table th { background: var(--brand-light); padding: 15px; font-weight: 600; color: var(--text-muted); border-bottom: 2px solid #ddd; position: sticky; top: 0;}
        .data-table td { padding: 15px; border-bottom: 1px solid #eee; font-size: 15px; vertical-align: middle; }
        .data-table tr:hover { background: #fafafa; }
        .region-name { font-weight: 700; color: #111; }
        .val-up { color: var(--up-color); font-weight: 600; }
        .val-down { color: var(--down-color); font-weight: 600; }
        .trend-sparkline { width: 100px; height: 30px; }

        @media (max-width: 1024px) {
            .summary-grid { grid-template-columns: repeat(2, 1fr); }
            .charts-section { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            .summary-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="topbar">
        <a href="index.html" class="logo"><i class="fa-solid fa-chart-pie"></i> 전국데이터지수 대시보드</a>
        <a href="index.html" class="back-btn">메인으로 돌아가기</a>
    </div>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <div>
                <h1>부동산 시장 종합 분석</h1>
                <p>전국 지역별 매매 및 전세 가격지수 일간 트렌드 (중개사용 패널)</p>
            </div>
            <div class="last-update">
                <i class="fa-regular fa-clock"></i> 최종 업데이트: <span id="update-time">Today 09:00</span>
            </div>
        </div>

        <div class="summary-grid">
            <div class="card">
                <div class="card-icon"><i class="fa-solid fa-building"></i></div>
                <div class="card-title">매매지수 (전국)</div>
                <div class="card-value" id="sum-sale-nat">99.8 <span class="card-change change-down"><i class="fa-solid fa-arrow-down"></i> 0.05%</span></div>
            </div>
            <div class="card">
                <div class="card-icon" style="background: #e3f2fd; color: #1976d2;"><i class="fa-solid fa-house"></i></div>
                <div class="card-title">전세지수 (전국)</div>
                <div class="card-value" id="sum-rent-nat">103.2 <span class="card-change change-up"><i class="fa-solid fa-arrow-up"></i> 0.18%</span></div>
            </div>
            <div class="card">
                <div class="card-icon" style="background: #fce4ec; color: #d32f2f;"><i class="fa-solid fa-arrow-trend-up"></i></div>
                <div class="card-title">오늘의 상승 HOT 지역</div>
                <div class="card-value" id="sum-hot">수도권 <span class="card-change change-up"><i class="fa-solid fa-arrow-up"></i> 0.10%</span></div>
            </div>
            <div class="card">
                <div class="card-icon" style="background: #fff3e0; color: #f57c00;"><i class="fa-solid fa-layer-group"></i></div>
                <div class="card-title">코스피 연동 지수</div>
                <div class="card-value" id="sum-kospi">2,750 <span class="card-change change-up"><i class="fa-solid fa-arrow-up"></i> 1.2%</span></div>
            </div>
        </div>

        <div class="charts-section">
            <div class="chart-box">
                <div class="chart-header">
                    <h2 class="chart-title">30일 매매지수 트렌드 (선택비교)</h2>
                    <div class="chart-filters">
                        <select id="chart-region-1">
                            <option value="서울">서울</option>
                            <option value="전국">전국</option>
                            <option value="수도권">수도권</option>
                        </select>
                        <select id="chart-region-2">
                            <option value="부산">부산</option>
                            <option value="대구">대구</option>
                            <option value="지방">지방</option>
                        </select>
                    </div>
                </div>
                <div class="canvas-container">
                    <canvas id="mainTrendChart"></canvas>
                </div>
            </div>
            <div class="chart-box">
                <div class="chart-header">
                    <h2 class="chart-title">전세 vs 매매 (전국)</h2>
                </div>
                <div class="canvas-container">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>
        </div>

        <div class="table-section">
            <h2 class="table-title"><i class="fa-solid fa-list-check"></i> 전국 시도별 지수 현황보드</h2>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>지역</th>
                        <th>구분</th>
                        <th>현재 지수</th>
                        <th>전일 대비</th>
                        <th>30일 추세</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Dynamic Data Goes Here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 로직 스크립트: 테스트용 더미 시계열 데이터를 우선 구축 -->
    <script>
        // 1. 임의의 30일치 시계열 데이터 생성기 (Supabase 연결 전까지 UI를 완벽히 띄우기 위함)
        const generateDummyHistory = (base, volatility) => {
            let data = [];
            let current = base;
            for(let i=30; i>=0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                const dStr = date.toISOString().split('T')[0];
                current = current + (Math.random() * volatility * 2 - volatility);
                data.push({ x: dStr, y: current.toFixed(2) });
            }
            return data;
        };

        const regionData = {
            '서울': generateDummyHistory(102.0, 0.2),
            '전국': generateDummyHistory(99.8, 0.1),
            '수도권': generateDummyHistory(101.5, 0.15),
            '부산': generateDummyHistory(96.0, 0.12),
            '대구': generateDummyHistory(90.5, 0.18),
            '지방': generateDummyHistory(92.0, 0.08)
        };

        // 2. 메인 트렌드 차트 (Chart.js)
        const ctxMain = document.getElementById('mainTrendChart').getContext('2d');
        const mainChart = new Chart(ctxMain, {
            type: 'line',
            data: {
                datasets: [
                    {
                        label: '서울',
                        data: regionData['서울'],
                        borderColor: '#0A2540',
                        backgroundColor: 'rgba(10,37,64,0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    },
                    {
                        label: '부산',
                        data: regionData['부산'],
                        borderColor: '#1976d2',
                        backgroundColor: 'transparent',
                        borderWidth: 2,
                        borderDash: [5, 5],
                        fill: false,
                        tension: 0.4
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { position: 'top' } },
                scales: {
                    x: { type: 'category', labels: regionData['서울'].map(d=>d.x) },
                    y: { min: 85, max: 110 }
                }
            }
        });

        // 지역 필터 체인지 이벤트
        document.getElementById('chart-region-1').addEventListener('change', (e) => {
            const reg = e.target.value;
            mainChart.data.datasets[0].label = reg;
            mainChart.data.datasets[0].data = regionData[reg];
            mainChart.update();
        });
        document.getElementById('chart-region-2').addEventListener('change', (e) => {
            const reg = e.target.value;
            mainChart.data.datasets[1].label = reg;
            mainChart.data.datasets[1].data = regionData[reg];
            mainChart.update();
        });

        // 3. 미니 막대 차트 (전세 vs 매매)
        const ctxRadar = document.getElementById('radarChart').getContext('2d');
        new Chart(ctxRadar, {
            type: 'bar',
            data: {
                labels: ['전국', '수도권', '서울', '부산', '대구', '광주'],
                datasets: [{
                    label: '현지수',
                    data: [99.8, 101.5, 102.4, 95.2, 90.1, 98.5],
                    backgroundColor: ['#e0e0e0', '#bbdefb', '#0A2540', '#cfd8dc', '#ffcdd2', '#c8e6c9'],
                    borderRadius: 4
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: {legend:{display:false}} }
        });

        // 4. 데이터 테이블 생성
        const tableBody = document.getElementById('table-body');
        const regions = ['전국', '수도권', '서울', '인천', '경기', '부산', '대구', '광주', '대전', '울산', '세종'];
        
        let trs = '';
        regions.forEach(reg => {
            const val = (Math.random() * 20 + 85).toFixed(1);
            const isUp = Math.random() > 0.5;
            const chg = (Math.random() * 0.5).toFixed(2);
            
            trs += `
            <tr>
                <td class="region-name">${reg}</td>
                <td>매매</td>
                <td style="font-weight:700;">${val}</td>
                <td class="${isUp ? 'val-up' : 'val-down'}"><i class="fa-solid ${isUp ? 'fa-arrow-up' : 'fa-arrow-down'}"></i> ${chg}%</td>
                <td><div style="width:100%; height:8px; background:#eee; border-radius:4px;"><div style="width:${val}%; height:100%; background:${isUp?'var(--up-color)':'var(--down-color)'}; border-radius:4px;"></div></div></td>
            </tr>
            `;
        });
        tableBody.innerHTML = trs;

    </script>
</body>
</html>
