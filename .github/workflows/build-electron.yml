name: Build and Release Electron App

on:
  push:
    branches: [ "main" ]
    #paths:
#      - 'chatbot-desktop/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install dependencies
      working-directory: chatbot-desktop
      run: npm install

    - name: Build Electron App
      working-directory: chatbot-desktop
      run: npm run build
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Rename Setup File
      working-directory: chatbot-desktop
      # electron-builder creates "gongsil-chatbot-pc Setup 1.0.0.exe" by default
      run: |
        mv dist/*.exe dist/GongsilChatbot_Setup.exe

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: chatbot-desktop/dist/GongsilChatbot_Setup.exe
        name: "怨듭떎梨쀫큸 PC踰꾩쟾 理쒖떊 ?ㅼ슫濡쒕뱶"
        tag_name: "v1.0.${{ github.run_number }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
